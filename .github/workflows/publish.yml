name: Publish libraries

# On a version tag (e.g. 0.1.0) publish the library modules to GitHub Packages
# under com.bitsycore.compose.native:desktop-* at the tag's version.
#
# Published from a SINGLE macOS runner: with kotlin.native.enableKlibsCrossCompilation
# every target's .klib builds here (apple native + linux/mingw cross-compiled),
# so all per-target publications exist and the root `kotlinMultiplatform` module's
# coordinates stay consistent. (Publishing per-OS would leave host-absent targets
# referenced by their default — un-renamed — coordinates in the root module.)

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-14
    env:
      PUBLISH_URL: https://maven.pkg.github.com/${{ github.repository }}
      PUBLISH_USERNAME: ${{ github.actor }}
      PUBLISH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: echo "v=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # SDL3 headers for the sdl3 cinterop. The .def's macOS path (/opt/homebrew)
      # is reused as the host include for every target's cinterop indexing
      # (vHostSdlInclude), so brew is all that's needed to cross-build the klibs.
      - name: Install SDL3 (headers for cinterop)
        run: brew install sdl3

      - name: Publish desktop-* @ ${{ steps.ver.outputs.v }}
        run: |
          ./gradlew --no-daemon -PsubsetIcons=false \
            -PreleaseVersion=${{ steps.ver.outputs.v }} \
            publishAllPublicationsToPublishRepository
