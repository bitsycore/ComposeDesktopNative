# Version manifest for scripts/build-sdl/*.sh — the one place to bump the
# static SDL3 / SDL3_ttf / SDL3_image / FreeType a scripts/build-sdl/build-all.sh
# builds into <repo>/libs/.
#
# Format:  KEY=value            — base value, applies to every host
#          KEY_macos=value      — per-host override (macos / linux / windows)
#          KEY_linux=value        The suffix matches BUILD_SDL_HOST as reported
#          KEY_windows=value      by _lib.sh's detect_host.
#
# Precedence (highest first):
#   1. Environment variable of the same name  (e.g. SDL_REF=main ./build-all.sh)
#   2. KEY_<host> in this file                (only when host matches)
#   3. KEY in this file
#
# Empty values are treated as "not set" — the next rung of the ladder applies.

# ==================
# MARK: SDL3 — core windowing / input / rendering
# ==================
SDL_URL=https://github.com/libsdl-org/SDL.git
SDL_REF=release-3.4.12

# ==================
# MARK: SDL3_ttf — variable-font axis API
# ==================
# Points at the in-house fork that adds TTF_SetFontAxisValue() (upstream still
# has no public API to drive OpenType axes wght / wdth / opsz / GRAD / FILL).
SDL_TTF_URL=https://github.com/bitsycore/SDL_ttf.git
SDL_TTF_REF=variable-font-axes

# ==================
# MARK: SDL3_image — image decoding (vendored PNG / JPG / SVG / WEBP)
# ==================
SDL_IMAGE_URL=https://github.com/libsdl-org/SDL_image.git
SDL_IMAGE_REF=release-3.4.4

# ==================
# MARK: FreeType — variable-font rasterisation (Material Symbols axes)
# ==================
FREETYPE_URL=https://github.com/freetype/freetype.git
FREETYPE_TAG=VER-2-13-3
